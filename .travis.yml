language: ruby
script: "script/test_all"
bundler_args: "--standalone --binstubs --without documentation"
before_install:
  - gem update --system --conservative || (gem i "rubygems-update:~>2.7" --no-document && update_rubygems)
  - gem update bundler --conservative

# In order to install old Rubies, we need to use old Ubuntu distibution.
dist: trusty

rvm:
  - 1.8.7
  - 1.9.2
  - 1.9.3
  - 2.0.0
  - 2.1
  - 2.2.10
  - 2.3.8
  - 2.4.10
  - 2.5.8
  - 2.6.6
  - 2.7.1
  - ree
  - jruby
env:
  - BRANCH=master
  - BRANCH=2-99-maintenance
matrix:
  include:
    - rvm: jruby-1.7.27
      env:
        - JRUBY_OPTS='--dev'
        - BRANCH=master
    - rvm: jruby-1.7.27
      env:
        - JRUBY_OPTS='--dev'
        - BRANCH=2-99-maintenance
    - rvm: jruby-1.7.27
      env:
        - JRUBY_OPTS='--dev --1.8'
        - BRANCH=master
    - rvm: jruby-1.7.27
      env:
        - JRUBY_OPTS='--dev --1.8'
        - BRANCH=2-99-maintenance
